name: ❓Question
description: Fazer pergunta sobre o projeto
title: "[PERGUNTA] "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use este formulario para perguntas sobre o NVN.PLUS.

  - type: dropdown
    id: area
    attributes:
      label: Area da duvida
      options:
        - WhatsApp / Conexao
        - FlowBuilder / Chatbot
        - CRM / Atendimento
        - API / Webhooks / Integracoes
        - Docker / Instalacao
        - Configuracao / Variaveis de ambiente
        - Relatorios
        - Outro
    validations:
      required: true

  - type: textarea
    id: pergunta
    attributes:
      label: Sua pergunta
      placeholder: Descreva sua duvida
    validations:
      required: true

  - type: input
    id: versao
    attributes:
      label: Versao do NVN.PLUS (opcional)
      placeholder: "ex: v1.1.9"

  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      placeholder: O que voce tentou e onde travou

  - type: checkboxes
    id: termos
    attributes:
      label: Checklist
      options:
        - label: Ja pesquisei documentacao e issues existentes.
          required: true
