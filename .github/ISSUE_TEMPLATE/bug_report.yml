name: 🐛 Bug report
description: Reportar bug ou comportamento inesperado
title: "[BUG] "
labels:
  - bug
  - precisa-triagem
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um bug no NVN.PLUS.

  - type: dropdown
    id: area
    attributes:
      label: Area afetada
      options:
        - WhatsApp / Conexao
        - FlowBuilder / Chatbot
        - CRM / Atendimento
        - API / Webhooks / Integracoes
        - Docker / Instalacao
        - Configuracao / Variaveis de ambiente
        - Relatorios
        - Interface / UX
        - Outro
    validations:
      required: true

  - type: textarea
    id: descricao
    attributes:
      label: Descricao do bug
      placeholder: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Acesse ...
        2. Clique em ...
        3. Veja o erro
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
    validations:
      required: true

  - type: input
    id: versao
    attributes:
      label: Versao do NVN.PLUS
      placeholder: "ex: v1.1.9"
    validations:
      required: true

  - type: dropdown
    id: instalacao
    attributes:
      label: Tipo de instalacao
      options:
        - Docker (recomendado)
        - Manual
        - Outro

  - type: checkboxes
    id: termos
    attributes:
      label: Checklist
      options:
        - label: Verifiquei se ja existe issue similar.
          required: true
